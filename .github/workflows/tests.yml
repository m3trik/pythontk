name: Tests

# Pythontk targets Windows DCCs (Maya/Max/Nuke). Its test suite uses
# ctypes.windll, c:/... paths, and Windows-specific subprocess behaviour.
# Run on windows-latest so tests match the platform they were written for.

on:
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov numpy Pillow
          pip install -e .

      - name: Run tests with coverage
        run: |
          pytest --tb=short -v --cov=pythontk --cov-report=xml --cov-report=term test/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./test/coverage.xml
          fail_ci_if_error: false
